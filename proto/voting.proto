syntax = "proto3";

package liveconcert.voting;

service VotingService {
  rpc SubmitVote(SubmitVoteRequest) returns (SubmitVoteResponse);
  rpc StreamVoteResults(StreamVoteResultsRequest) returns (stream VoteResultsUpdate);
}

message SubmitVoteRequest {
  string user_id = 1;
  string song_title = 2;
}

message SubmitVoteResponse {
  bool success = 1;
  string message = 2;
}

message StreamVoteResultsRequest {
  string user_id = 1;
}

message SongVote {
  string song_title = 1;
  int32 total_votes = 2;
}

message VoteResultsUpdate {
  repeated SongVote results = 1;
  int64 updated_at_unix = 2;
}
